name: Pull Request Validation

on:
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      # Install once (monorepo root)
      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      # Lint all workspaces
      - name: Lint project
        run: npm run lint

      # Build all workspaces (order controlled in root scripts)
      - name: Build project
        run: npm run build
